<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音控人員講習會海報 - 視覺強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #020617;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sound-wave {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 80px;
        }
        .bar {
            width: 6px;
            background: linear-gradient(to top, #3b82f6, #22d3ee);
            border-radius: 3px;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { height: 15px; opacity: 0.4; }
            50% { height: 70px; opacity: 1; }
        }
        .big-icon-bg {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(34, 211, 238, 0.1));
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-10">

    <!-- Poster Container -->
    <div class="relative w-full max-w-5xl bg-slate-950 rounded-[2.5rem] overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10">
        
        <!-- Animated Background Accents -->
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-600/20 rounded-full blur-[120px] -mr-64 -mt-64 animate-pulse"></div>
        <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[120px] -ml-64 -mb-64"></div>

        <div class="relative z-10 flex flex-col lg:flex-row">
            
            <!-- Left Side: High Impact Visual -->
            <div class="w-full lg:w-[40%] p-10 lg:p-16 bg-gradient-to-b from-blue-950/50 to-transparent flex flex-col justify-center items-center text-center border-b lg:border-b-0 lg:border-r border-white/5">
                <div class="sound-wave mb-10">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.7s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                </div>
                
                <h1 class="text-5xl lg:text-6xl font-[900] text-white leading-none mb-8 tracking-tighter">
                    音控人員<br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 text-4xl lg:text-5xl">講習會</span>
                </h1>

                <div class="relative py-6 px-4">
                    <p class="text-2xl lg:text-3xl text-blue-100 italic font-light leading-snug">
                        「若是沒有聽見<br/>
                        <span class="text-blue-400 font-bold not-italic">怎能相信呢？</span>」
                    </p>
                    <div class="h-1.5 w-16 bg-blue-500 mx-auto mt-8 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                </div>
            </div>

            <!-- Right Side: Visual Info Cards -->
            <div class="w-full lg:w-[60%] p-8 lg:p-16 space-y-8">
                
                <!-- Large Visual Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Time Card -->
                    <div class="glass-morphism rounded-[2rem] p-8 flex flex-col items-center text-center hover:bg-white/5 transition-colors group">
                        <div class="w-16 h-16 big-icon-bg rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h3 class="text-slate-500 text-sm font-bold tracking-widest mb-1">時間</h3>
                        <p class="text-3xl font-black text-white">4月18日</p>
                        <p class="text-xl text-blue-400 font-bold">19:00 - 20:30</p>
                    </div>

                    <!-- Location Card -->
                    <div class="glass-morphism rounded-[2rem] p-8 flex flex-col items-center text-center hover:bg-white/5 transition-colors group">
                        <div class="w-16 h-16 big-icon-bg rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            </svg>
                        </div>
                        <h3 class="text-slate-500 text-sm font-bold tracking-widest mb-1">地點</h3>
                        <p class="text-3xl font-black text-white">二樓大會堂</p>
                        <p class="text-cyan-400 font-bold text-sm uppercase tracking-wider">現場參與</p>
                    </div>

                    <!-- Speaker & Audience Combined -->
                    <div class="glass-morphism rounded-[2rem] p-8 md:col-span-2 flex flex-col md:flex-row items-center gap-8">
                        <div class="flex flex-col items-center md:items-start text-center md:text-left flex-1 border-b md:border-b-0 md:border-r border-white/10 pb-6 md:pb-0 md:pr-8">
                            <div class="flex items-center gap-3 mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">主講人員</span>
                            </div>
                            <p class="text-4xl font-black text-white">資訊股</p>
                        </div>

                        <div class="flex-1 space-y-3">
                            <span class="text-slate-500 text-xs font-bold uppercase tracking-widest block text-center md:text-left">對象</span>
                            <div class="flex flex-wrap justify-center md:justify-start gap-2">
                                <span class="px-4 py-1.5 bg-blue-500/10 border border-blue-500/30 rounded-full text-blue-200 text-sm font-medium">全體音控人員</span>
                                <span class="px-4 py-1.5 bg-cyan-500/10 border border-cyan-500/30 rounded-full text-cyan-200 text-sm font-medium">預培訓志願者</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Giant CTA Button -->
                <div class="relative group cursor-pointer">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-3xl blur opacity-30 group-hover:opacity-60 transition duration-1000"></div>
                    <div class="relative bg-gradient-to-r from-blue-600 to-cyan-500 rounded-[1.5rem] p-6 text-white text-center">
                        <p class="text-sm font-bold text-blue-100 uppercase tracking-[0.2em] mb-1">請立即行動</p>
                        <p class="text-2xl font-black">於「音控群組」報名或請假</p>
                    </div>
                </div>

                <!-- Minimal Footer -->
                <div class="flex justify-between items-center px-4">
                    <span class="text-slate-600 text-[10px] font-bold tracking-[0.3em]">DAXI INFO 2024</span>
                    <div class="flex gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-cyan-500"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
