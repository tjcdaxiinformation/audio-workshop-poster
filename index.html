<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音控人員講習會海報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sound-wave {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 60px;
        }
        .bar {
            width: 4px;
            background: #38bdf8;
            border-radius: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { height: 10px; opacity: 0.5; }
            50% { height: 50px; opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <!-- Poster Container -->
    <div class="relative w-full max-w-4xl bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border border-slate-800">
        
        <!-- Background Decoration -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] -mr-48 -mt-48"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-cyan-600/10 rounded-full blur-[100px] -ml-48 -mb-48"></div>

        <div class="relative z-10 flex flex-col md:flex-row">
            
            <!-- Left Side: Visual & Slogan -->
            <div class="w-full md:w-2/5 p-8 md:p-12 bg-gradient-to-br from-blue-900/40 to-slate-900 flex flex-col justify-between items-center text-center border-b md:border-b-0 md:border-r border-slate-800">
                <div class="mt-8">
                    <div class="sound-wave justify-center mb-6">
                        <div class="bar" style="animation-delay: 0s"></div>
                        <div class="bar" style="animation-delay: 0.2s"></div>
                        <div class="bar" style="animation-delay: 0.4s"></div>
                        <div class="bar" style="animation-delay: 0.6s"></div>
                        <div class="bar" style="animation-delay: 0.4s"></div>
                        <div class="bar" style="animation-delay: 0.2s"></div>
                        <div class="bar" style="animation-delay: 0s"></div>
                    </div>
                    <p class="text-blue-400 font-medium tracking-widest mb-2 uppercase text-sm">Audio Control Workshop</p>
                    <h1 class="text-4xl md:text-5xl font-black text-white leading-tight mb-4 tracking-tight">音控人員<br/>講習會</h1>
                </div>

                <div class="mb-8">
                    <p class="text-xl md:text-2xl text-blue-100 italic font-light leading-relaxed">
                        「若是沒有聽見<br/>
                        <span class="text-blue-400 font-bold">怎能相信呢？</span>」
                    </p>
                    <div class="h-1.5 w-12 bg-blue-500 mx-auto mt-6 rounded-full"></div>
                </div>
            </div>

            <!-- Right Side: Details -->
            <div class="w-full md:w-3/5 p-8 md:p-12 space-y-6">
                
                <!-- Info Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Time Section -->
                    <div class="glass-morphism rounded-2xl p-5 border-l-4 border-blue-500">
                        <div class="flex items-center gap-3 mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <h3 class="text-slate-400 text-xs font-bold tracking-wider">時間 TIME</h3>
                        </div>
                        <p class="text-xl font-bold text-white">4月18日</p>
                        <p class="text-blue-400 font-medium text-sm">19:00 ~ 20:30</p>
                    </div>

                    <!-- Location Section -->
                    <div class="glass-morphism rounded-2xl p-5 border-l-4 border-cyan-500">
                        <div class="flex items-center gap-3 mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <h3 class="text-slate-400 text-xs font-bold tracking-wider">地點 LOCATION</h3>
                        </div>
                        <p class="text-xl font-bold text-white">二樓大會堂</p>
                        <p class="text-cyan-400 font-medium text-sm">請準時入座</p>
                    </div>

                    <!-- Speaker Section (Spans 2 columns on sm) -->
                    <div class="glass-morphism rounded-2xl p-5 border-l-4 border-indigo-500 sm:col-span-2">
                        <div class="flex items-center gap-3 mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <h3 class="text-slate-400 text-xs font-bold tracking-wider">講員 SPEAKER</h3>
                        </div>
                        <p class="text-xl font-bold text-white">資訊股</p>
                    </div>
                </div>

                <!-- Audience Section -->
                <div class="space-y-3">
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 text-xs font-bold tracking-widest uppercase">參加人員 PARTICIPANTS</span>
                        <div class="h-px flex-1 bg-slate-800"></div>
                    </div>
                    
                    <ul class="space-y-2 text-sm">
                        <li class="flex items-center gap-3 text-slate-300">
                            <span class="flex-shrink-0 w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
                            <span>所有被安排之音控人員</span>
                        </li>
                        <li class="flex items-center gap-3 text-slate-300">
                            <span class="flex-shrink-0 w-1.5 h-1.5 bg-cyan-400 rounded-full"></span>
                            <span>有志音控工作之預培訓人員</span>
                        </li>
                    </ul>
                </div>

                <!-- Action Section -->
                <div class="bg-gradient-to-r from-blue-600 to-cyan-600 rounded-2xl p-5 text-white shadow-lg shadow-blue-900/40">
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-3">
                        <div class="text-center sm:text-left">
                            <p class="text-blue-100 text-xs opacity-90 mb-0.5">報名方式 REGISTRATION</p>
                            <p class="text-lg font-bold leading-tight">請於音控群組報名或請假</p>
                        </div>
                        <div class="bg-white/20 px-4 py-2 rounded-xl backdrop-blur-md border border-white/20 text-sm font-bold tracking-wide">
                            備有講義
                        </div>
                    </div>
                </div>

                <!-- Footer Info -->
                <div class="pt-2 border-t border-slate-800/50">
                    <p class="text-center text-slate-600 text-[10px] uppercase tracking-[0.2em]">
                        Audio Engineering Workshop &bull; Infotech Dept &bull; 2024
                    </p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
