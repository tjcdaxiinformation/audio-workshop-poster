<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音控人員講習會海報 - 2026 專業版</title>
    <!-- 預載入字體以提升 LCP 效能 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #3b82f6;
            --accent-cyan: #22d3ee;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .sound-wave {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 80px;
        }
        .bar {
            width: 6px;
            background: linear-gradient(to top, var(--accent-blue), var(--accent-cyan));
            border-radius: 99px;
            animation: pulse 1.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { height: 20px; opacity: 0.4; transform: scaleY(1); }
            50% { height: 75px; opacity: 1; transform: scaleY(1.1); }
        }
        .big-icon-bg {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(34, 211, 238, 0.08));
        }
        /* 支援現代瀏覽器的滾動條優化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-10 selection:bg-blue-500/30">

    <!-- Poster Container -->
    <main class="relative w-full max-w-5xl bg-slate-950 rounded-[3rem] overflow-hidden shadow-[0_0_80px_rgba(0,0,0,0.6)] border border-white/5">
        
        <!-- Background Decor -->
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[150px] -mr-80 -mt-80 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-cyan-600/10 rounded-full blur-[150px] -ml-80 -mb-80 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col lg:flex-row">
            
            <!-- Left Side: Visual -->
            <section class="w-full lg:w-[42%] p-10 lg:p-20 bg-gradient-to-b from-blue-900/20 to-transparent flex flex-col justify-center items-center text-center border-b lg:border-b-0 lg:border-r border-white/5">
                <div class="sound-wave mb-12" aria-hidden="true">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.7s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                </div>
                
                <h1 class="text-6xl lg:text-7xl font-[900] text-white leading-none mb-10 tracking-tighter">
                    音控人員<br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">講習會</span>
                </h1>

                <div class="relative py-8 px-6">
                    <blockquote class="text-2xl lg:text-3xl text-blue-100/90 italic font-light leading-relaxed">
                        「若是沒有聽見<br/>
                        <span class="text-blue-400 font-bold not-italic drop-shadow-sm">怎能相信呢？</span>」
                    </blockquote>
                    <div class="h-1.5 w-20 bg-gradient-to-r from-blue-600 to-cyan-400 mx-auto mt-10 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.6)]"></div>
                </div>
            </section>

            <!-- Right Side: Content -->
            <section class="w-full lg:w-[58%] p-8 lg:p-16 space-y-10">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Time Card -->
                    <article class="glass-morphism rounded-[2.5rem] p-8 flex flex-col items-center text-center hover:bg-white/10 transition-all duration-500 group">
                        <div class="w-16 h-16 big-icon-bg rounded-2xl flex items-center justify-center mb-5 group-hover:rotate-6 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h2 class="text-slate-500 text-xs font-bold tracking-[0.3em] mb-2">TIME</h2>
                        <p class="text-3xl font-black text-white mb-1">4月18日</p>
                        <p class="text-xl text-blue-400 font-bold">19:00 - 20:30</p>
                    </article>

                    <!-- Location Card -->
                    <article class="glass-morphism rounded-[2.5rem] p-8 flex flex-col items-center text-center hover:bg-white/10 transition-all duration-500 group">
                        <div class="w-16 h-16 big-icon-bg rounded-2xl flex items-center justify-center mb-5 group-hover:-rotate-6 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            </svg>
                        </div>
                        <h2 class="text-slate-500 text-xs font-bold tracking-[0.3em] mb-2">LOCATION</h2>
                        <p class="text-3xl font-black text-white mb-1">二樓大會堂</p>
                        <p class="text-cyan-400 font-bold text-xs tracking-widest uppercase">On-site Workshop</p>
                    </article>

                    <!-- Combined Details -->
                    <article class="glass-morphism rounded-[2.5rem] p-8 md:col-span-2 flex flex-col md:flex-row items-center gap-10">
                        <div class="flex-1 text-center md:text-left border-b md:border-b-0 md:border-r border-white/10 pb-8 md:pb-0 md:pr-10">
                            <div class="flex items-center justify-center md:justify-start gap-3 mb-4">
                                <span class="p-2 bg-indigo-500/10 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                </span>
                                <h3 class="text-slate-500 text-xs font-bold tracking-widest uppercase">講員 SPEAKER</h3>
                            </div>
                            <p class="text-4xl font-black text-white">資訊股</p>
                        </div>

                        <div class="flex-1 w-full">
                            <h3 class="text-slate-500 text-xs font-bold tracking-widest uppercase mb-4 text-center md:text-left tracking-[0.2em]">參與對象 AUDIENCE</h3>
                            <div class="flex flex-wrap justify-center md:justify-start gap-3">
                                <span class="px-5 py-2 bg-blue-500/10 border border-blue-500/20 rounded-2xl text-blue-300 text-sm font-semibold">全體音控人員</span>
                                <span class="px-5 py-2 bg-cyan-500/10 border border-cyan-500/20 rounded-2xl text-cyan-300 text-sm font-semibold">預培訓志願者</span>
                            </div>
                        </div>
                    </article>
                </div>

                <!-- Registration CTA -->
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-400 rounded-[2rem] blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                    <div class="relative bg-gradient-to-r from-blue-600 to-cyan-500 rounded-[2rem] p-8 text-white flex flex-col sm:flex-row items-center justify-between gap-6 shadow-2xl">
                        <div class="text-center sm:text-left">
                            <h3 class="text-sm font-black text-blue-100 uppercase tracking-[0.3em] mb-1">REGISTRATION</h3>
                            <p class="text-2xl font-black">於「音控群組」報名或請假</p>
                        </div>
                        <button class="bg-white/20 hover:bg-white/30 px-8 py-3 rounded-2xl backdrop-blur-md border border-white/20 text-sm font-black tracking-widest transition-all active:scale-95">
                            立即報名
                        </button>
                    </div>
                </div>

                <!-- Footer -->
                <footer class="flex justify-between items-center px-6 pt-4">
                    <p class="text-slate-600 text-[11px] font-bold tracking-[0.4em]">DAXI INFORMATION &bull; 2026 EDITION</p>
                    <div class="flex gap-3">
                        <span class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></span>
                        <span class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_rgba(34,211,238,0.5)]"></span>
                        <span class="w-2 h-2 rounded-full bg-slate-800"></span>
                    </div>
                </footer>
            </section>
        </div>
    </main>

</body>
</html>
